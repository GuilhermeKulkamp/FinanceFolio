{% extends "base.html" %} 
{% load crispy_forms_tags %} 
{% block title %}Meu Perfil - Controle Financeiro{% endblock %} 
{% block content %}
<div class="row mb-4">
  <div class="col-md-12">
    <h1>Meu Perfil</h1>
    <p class="text-muted">Gerencie suas informações pessoais</p>
  </div>
</div>

<div class="row">
  <div class="col-md-8 mx-auto">
    <div class="card">
      <div class="card-header">
        <ul class="nav nav-tabs card-header-tabs">
          <li class="nav-item">
            <a class="nav-link active" href="#profile" data-bs-toggle="tab"
              >Informações Pessoais</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'accounts:change_password' %}"
              >Alterar Senha</a
            >
          </li>
        </ul>
      </div>
      <div class="card-body">
        <div class="tab-content">
          <div class="tab-pane fade show active" id="profile">
            <form method="post">
              {% csrf_token %} {{ user_form|crispy }}

              <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save me-2"></i>Salvar Alterações
                </button>
                <a href="{% url 'core:dashboard' %}" class="btn btn-secondary">
                  <i class="fas fa-times me-2"></i>Cancelar
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
