{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Alterar Senha - Controle Financeiro{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>Alterar Senha</h1>
        <p class="text-muted">Atualize sua senha de acesso</p>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <ul class="nav nav-tabs card-header-tabs">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'accounts:profile' %}">Informações Pessoais</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#password" data-bs-toggle="tab">Alterar Senha</a>
                    </li>
                </ul>
            </div>
            <div class="card-body">
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="password">
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-key me-2"></i>Alterar Senha
                                </button>
                                <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
