{% extends "base.html" %}

{% block title %}Senha Alterada - Controle Financeiro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="auth-form">
            <div class="text-center mb-4">
                <h1 class="login-logo">
                    <i class="fas fa-chart-line me-2"></i>Controle Financeiro
                </h1>
                <h5>Senha Alterada com Sucesso</h5>
                <div class="alert alert-success">
                    <p>Sua senha foi alterada com sucesso!</p>
                    <p>Agora você pode fazer login com sua nova senha.</p>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt me-1"></i> Fazer Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
