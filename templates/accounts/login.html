{% extends "base.html" %} {% load crispy_forms_tags %} {% block title %}Login -
Controle Financeiro{% endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="auth-form">
      <div class="text-center mb-4">
        <h1 class="login-logo">
          <i class="fas fa-chart-line me-2"></i>Controle Financeiro
        </h1>
        <p class="text-muted">Faça login para acessar o sistema</p>
      </div>

      <form method="post">
        {% csrf_token %} {{ form|crispy }}

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt me-2"></i>Entrar
          </button>
        </div>

        <div class="text-center mt-3">
          <a
            href="{% url 'accounts:password_reset' %}"
            class="text-decoration-none"
          >
            Esqueceu sua senha?
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
